spring.application.name=studentmaneger
server.port=${PORT:8080}

# Datasource (use environment variables on Render)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:sqlserver://localhost:1433;databaseName=school;encrypt=false}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
# Let Hibernate auto-detect dialect if possible (remove explicit setting)
# spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.thymeleaf.cache=false

# Chi tiết lỗi
server.error.include-message=always
server.error.include-stacktrace=always
