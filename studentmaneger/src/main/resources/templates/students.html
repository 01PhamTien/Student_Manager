<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student Manager</title>
    <link rel="icon" th:href="@{/images/logo.svg}" type="image/svg+xml">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .content-wrapper {
            max-width: 1100px;
            margin: 50px auto;
        }

        h2 {
            font-weight: 700;
            margin-bottom: 25px;
            color: #333;
        }

        .card {
            border-radius: 14px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.06);
            border: none;
        }

        .table thead th {
            background: #0d6efd;
            color: white;
            border: none;
        }

        .table tbody tr:hover {
            background: #eef3ff;
        }

        .btn {
            border-radius: 8px;
        }

        .search-box input {
            border-radius: 10px;
        }

        .top-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
        }
    </style>
</head>

<body>

<div class="content-wrapper">

    <div th:replace="fragments/header :: header('Student Manager', ${students.size()})"></div>

    <div class="card p-4">

        <!-- Thanh hành động trên -->
        <div class="top-actions">
            <div>
                <a th:href="@{/students/add}" class="btn btn-primary">
                    <i class="fas fa-plus"></i> Thêm mới
                </a>
            </div>

            <div class="d-flex align-items-center gap-2">
                <form th:action="@{/students}" method="get" class="d-flex gap-2 align-items-center">
                    <input type="text" name="q" th:value="${q}" class="form-control form-control-sm" placeholder="Tên hoặc ID" style="width:260px;">

                    <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-toggle="collapse" data-bs-target="#filters" aria-expanded="false" aria-controls="filters">
                        <i class="fas fa-filter"></i> Bộ lọc
                    </button>

                    <button type="submit" class="btn btn-outline-secondary btn-sm">
                        <i class="fas fa-search"></i>
                    </button>

                    <a th:href="@{/students}" class="btn btn-outline-secondary btn-sm">Reset</a>

                    <!-- hidden filters group (collapsible) -->
                    <div class="collapse mt-2" id="filters" style="position:absolute; right:10px; top:44px; z-index:10; background:white; padding:12px; border-radius:8px; box-shadow:0 6px 18px rgba(0,0,0,0.08)">
                        <div class="d-flex gap-2">
                            <input type="number" name="minAge" th:value="${minAge}" class="form-control form-control-sm" placeholder="Tuổi từ" style="width:120px;">
                            <input type="number" name="maxAge" th:value="${maxAge}" class="form-control form-control-sm" placeholder="Đến" style="width:120px;">
                        </div>
                        <div class="mt-2">
                            <select name="sort" class="form-select form-select-sm">
                                <option value="">Sắp xếp</option>
                                <option value="name" th:selected="${sort} == 'name'">Tên A-Z</option>
                                <option value="age" th:selected="${sort} == 'age'">Tuổi</option>
                            </select>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- Bảng dữ liệu -->
        <div class="table-responsive">
            <table class="table table-bordered table-striped align-middle">
                <thead>
                    <tr class="text-center">
                        <th style="width: 70px;">ID</th>
                        <th style="width: 240px;">Tên</th>
                        <th style="width: 90px;">Tuổi</th>
                        <th>Email</th>
                        <th style="width: 180px;">Hành động</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="student : ${students}">
                        <td th:text="${student.id}" class="text-center"></td>
                        <td th:text="${student.name}"></td>
                        <td th:text="${student.age}" class="text-center"></td>
                        <td th:text="${student.email}"></td>
                        <td class="text-center">

                            <a th:href="@{/students/edit/{id}(id=${student.id})}" class="btn btn-warning btn-sm">
                                <i class="fas fa-edit"></i> Sửa
                            </a>

                            <form th:action="@{/students/delete/{id}(id=${student.id})}" 
                                  method="post" 
                                  style="display:inline-block"
                                  onsubmit="return confirm('Bạn chắc chắn muốn xóa sinh viên này?');">
                                <button type="submit" class="btn btn-danger btn-sm">
                                    <i class="fas fa-trash"></i> Xóa
                                </button>
                            </form>

                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>

</body>
</html>
