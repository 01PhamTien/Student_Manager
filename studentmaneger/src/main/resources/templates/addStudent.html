<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${isNew} ? 'Student Manager - Add' : 'Student Manager - Edit'">Student Manager</title>
    <link rel="icon" th:href="@{/images/logo.svg}" type="image/svg+xml">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }
        .card {
            border-radius: 14px;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.07);
        }
        .card-header {
            padding: 20px;
            border-radius: 14px 14px 0 0 !important;
            background: #0d6efd;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .form-control {
            padding: 10px 14px;
            border-radius: 10px;
        }
        label {
            font-weight: 600;
        }
        .btn {
            padding: 10px 18px;
            border-radius: 10px;
        }
        .container {
            max-width: 650px;
        }
    </style>
</head>

<body class="container mt-5">

    <div class="card">
    <div th:replace="fragments/header :: header(${isNew} ? 'Add Student' : 'Edit Student', 0)" class="mb-3"></div>

        <div class="card-body p-4">

            <div th:if="${isNew}">
                <form th:action="@{/students/add}" th:object="${student}" method="post">
                    <div th:if="${error}" class="alert alert-danger" th:text="${error == 'exists' ? 'ID đã tồn tại. Vui lòng chọn ID khác.' : error}"></div>

                    <div class="mb-3">
                        <label class="form-label">Mã số sinh viên (ID):</label>
                        <input type="number"
                               th:field="*{id}"
                               class="form-control"
                               placeholder="Nhập ID"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Họ và tên:</label>
                        <input type="text" th:field="*{name}" class="form-control" placeholder="Nhập họ tên" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Tuổi:</label>
                        <input type="number" th:field="*{age}" class="form-control" placeholder="Nhập tuổi">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email:</label>
                        <input type="email" th:field="*{email}" class="form-control" placeholder="example@email.com">
                    </div>

                    <div class="mt-4 d-flex gap-3">
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-plus"></i> Thêm
                        </button>

                        <a th:href="@{/students}" class="btn btn-secondary">
                            <i class="fas fa-arrow-left"></i> Quay lại danh sách
                        </a>
                    </div>
                </form>
            </div>

            <div th:if="${!isNew}">
                <form th:action="@{/students/update}" th:object="${student}" method="post">
                    <div th:if="${error}" class="alert alert-danger" th:text="${error == 'notfound' ? 'Sinh viên không tồn tại (ID).' : error}"></div>

                    <div class="mb-3">
                        <label class="form-label">Mã số sinh viên (ID):</label>
                        <input type="number"
                               th:field="*{id}"
                               class="form-control"
                               placeholder="Nhập ID"
                               readonly>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Họ và tên:</label>
                        <input type="text" th:field="*{name}" class="form-control" placeholder="Nhập họ tên" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Tuổi:</label>
                        <input type="number" th:field="*{age}" class="form-control" placeholder="Nhập tuổi">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email:</label>
                        <input type="email" th:field="*{email}" class="form-control" placeholder="example@email.com">
                    </div>

                    <div class="mt-4 d-flex gap-3">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Cập nhật
                        </button>

                        <a th:href="@{/students}" class="btn btn-secondary">
                            <i class="fas fa-arrow-left"></i> Quay lại danh sách
                        </a>
                    </div>
                </form>
            </div>

        </div>
    </div>

</body>
</html>
