#         value: "${AWS_SECRET_ACCESS_KEY}"

# Notes:
# - After pushing this file, go to Render dashboard -> New -> From Render YAML -> connect repo and follow prompts.
# - In Render, set the actual DB credentials and AWS credentials as Environment / Secrets.
# - If you prefer Render-managed Postgres, create it via Dashboard and then set SPRING_DATASOURCE_URL to the provided connection string.
