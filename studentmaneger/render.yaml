# Render service configuration
# - Replace placeholders (YOUR-...) with real values after creating service or DB
# - For secrets (db password), set them in Render Dashboard or use Render's secrets mechanism

services:
  - type: web
    name: student-manager
    env: docker
    plan: free
    branch: main
    dockerfilePath: ./Dockerfile
    buildCommand: mvn -DskipTests package
    startCommand: java -Dserver.port=$PORT -jar target/*.jar
    envVars:
      # Do NOT include sensitive values here. Add them as secrets in Render dashboard.
      - key: SPRING_DATASOURCE_URL
        value: "${SPRING_DATASOURCE_URL}"
      - key: SPRING_DATASOURCE_USERNAME
        value: "${SPRING_DATASOURCE_USERNAME}"
      - key: SPRING_DATASOURCE_PASSWORD
        value: "${SPRING_DATASOURCE_PASSWORD}"

databases:
  - name: student-manager-db
    engine: postgres
    plan: starter
    version: "14"

# Optional: You can add cron jobs here to run backups or maintenance tasks
